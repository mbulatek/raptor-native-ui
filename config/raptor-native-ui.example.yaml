# Example configuration with reusable page presets, named scenes and optional boot BMP images.
#
# Monochrome BMP support:
# - supported format: uncompressed 1-bit BMP
# - configure under page.image.path
# - x/y set the top-left placement on the display
# - currently most useful for boot pages and splash screens

ipc_config_path: /etc/raptor/raptor-ipc.yaml

logging:
  level: info

initial_scene: performance

displays:
  - id: main
    driver: waveshare
    model: oled_1in5
    layout: auto
    rotation: 0
    refresh_period_ms: 250
    force_clear_each_frame: false
    hardware:
      gpiochip: 0
      spi_device: 0
      spi_channel: 0
      spi_speed_hz: 10000000
      spi_flags: 3
      cs_gpio: -1
      reset_gpio: 27
      dc_gpio: 25

  - id: sidecar
    driver: waveshare
    model: oled_1in5
    layout: auto
    rotation: 0
    refresh_period_ms: 250
    force_clear_each_frame: false
    hardware:
      gpiochip: 0
      spi_device: 0
      spi_channel: 1
      spi_speed_hz: 10000000
      spi_flags: 3
      cs_gpio: -1
      reset_gpio: 22
      dc_gpio: 24

  - id: mini
    driver: waveshare
    model: oled_0in91
    layout: auto
    rotation: 0
    refresh_period_ms: 500
    force_clear_each_frame: false
    hardware:
      gpiochip: 0
      spi_device: 0
      spi_channel: 2
      spi_speed_hz: 8000000
      spi_flags: 3
      cs_gpio: 6
      reset_gpio: 23
      dc_gpio: 18

pages:
  - id: boot_debug_main
    type: boot
    title: Boot Debug
    allowed_models: [oled_1in5, oled_1in5_b]
    default_variant: square
    image:
      path: /usr/share/raptor-native-ui/images/boot-main.bmp
      x: 0
      y: 0

  - id: boot_debug_mini
    type: boot
    title: Boot Debug
    allowed_models: [oled_0in91]
    default_variant: compact
    image:
      path: /usr/share/raptor-native-ui/images/boot-mini.bmp
      x: 0
      y: 0

  - id: perf_transport_main
    type: transport
    title: Transport
    allowed_models: [oled_1in5, oled_1in5_b]
    default_variant: square

  - id: perf_song_main
    type: song
    title: Song
    allowed_models: [oled_1in5_b]
    default_variant: song_tracks

  - id: perf_song_io_main
    type: song
    title: Song
    allowed_models: [oled_1in5_b]
    default_variant: song_io

  - id: perf_track_main
    type: track
    title: Track
    allowed_models: [oled_1in5_b]
    default_variant: square

  - id: perf_playing_main
    type: playing
    title: Playing
    allowed_models: [oled_1in5, oled_1in5_b]
    default_variant: square

  - id: perf_recording_main
    type: recording
    title: Recording
    allowed_models: [oled_1in5, oled_1in5_b]
    default_variant: square

  - id: perf_transport_wide
    type: transport
    title: Transport
    allowed_models: [oled_1in54, oled_2in42]
    default_variant: wide

  - id: perf_midi_main
    type: midi_monitor
    title: MIDI Focus
    allowed_models: [oled_1in5, oled_1in5_b]
    default_variant: square

  - id: perf_midi_sidecar
    type: midi_monitor
    title: MIDI Sidecar
    allowed_models: [oled_1in5, oled_1in5_b]
    default_variant: square

  - id: perf_status_mini
    type: status
    title: Stage Status
    allowed_models: [oled_0in91]
    default_variant: compact

  - id: maint_status_main
    type: status
    title: Service Status
    allowed_models: [oled_1in5, oled_1in5_b]
    default_variant: square

  - id: maint_status_sidecar
    type: status
    title: Diagnostics
    allowed_models: [oled_1in5, oled_1in5_b]
    default_variant: square

  - id: maint_status_portrait
    type: status
    title: Diagnostics
    allowed_models: [oled_1in3, oled_1in32]
    default_variant: portrait

  - id: maint_status_mini
    type: status
    title: Health
    allowed_models: [oled_0in91]
    default_variant: compact

  - id: standby_status_main
    type: status
    title: Standby
    allowed_models: [oled_1in5, oled_1in5_b]
    default_variant: square

  - id: standby_status_mini
    type: status
    title: Standby
    allowed_models: [oled_0in91]
    default_variant: compact

assignments:
  - display_id: main
    page_id: perf_transport_main
  - display_id: sidecar
    page_id: perf_midi_sidecar
  - display_id: mini
    page_id: perf_status_mini

scenes:
  - id: performance
    title: Performance
    assignments:
      - display_id: main
        page_id: perf_transport_main
      - display_id: sidecar
        page_id: perf_midi_sidecar
      - display_id: mini
        page_id: perf_status_mini

  - id: maintenance
    title: Maintenance
    assignments:
      - display_id: main
        page_id: maint_status_main
      - display_id: sidecar
        page_id: maint_status_sidecar
      - display_id: mini
        page_id: maint_status_mini

  - id: boot
    title: Boot Debug
    assignments:
      - display_id: main
        page_id: boot_debug_main
      - display_id: sidecar
        page_id: maint_status_sidecar
      - display_id: mini
        page_id: boot_debug_mini

  - id: standby
    title: Standby
    assignments:
      - display_id: main
        page_id: standby_status_main
      - display_id: sidecar
        page_id: maint_status_sidecar
      - display_id: mini
        page_id: standby_status_mini
